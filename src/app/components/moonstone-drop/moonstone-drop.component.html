<div class="container">
  <h1>Moonstone drop sim</h1>

  <button mat-raised-button
    (click)="mulliganAll()">
    <mat-icon>videogame_asset</mat-icon>
    Drop moonstones!
  </button>

  <!-- Map  -->
  <app-map [stones]="stones" class="map-container"/>

    <!-- Table  -->
    <table mat-table [dataSource]="stones" class="table-container">
      <ng-container matColumnDef="colour">
        <th mat-header-cell *matHeaderCellDef> Colour </th>
        <td mat-cell *matCellDef="let stone"> <app-moonstone-icon [colour]="getColour(stone)"></app-moonstone-icon> </td>
      </ng-container>
      <ng-container matColumnDef="degrees">
        <th mat-header-cell *matHeaderCellDef> Degrees </th>
        <td mat-cell *matCellDef="let stone"> {{stone.degrees}} </td>
      </ng-container>
      <ng-container matColumnDef="distance">
        <th mat-header-cell *matHeaderCellDef> Distance </th>
        <td mat-cell *matCellDef="let stone">
          {{ stone.distance }}
        </td>
      </ng-container>
      <ng-container matColumnDef="depth">
        <th mat-header-cell *matHeaderCellDef> Depth </th>
        <td mat-cell *matCellDef="let stone">
          {{ stone.depth }}
        </td>
      </ng-container>
      <ng-container matColumnDef="reroll">
        <th mat-header-cell *matHeaderCellDef></th>
        <td mat-cell *matCellDef="let stone; let i = index">
          <button mat-raised-button color="primary" (click)="rerollStone(i)"><mat-icon>refresh</mat-icon>Reroll</button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
      <tr mat-row *matRowDef="let row; columns: columnsToDisplay"></tr>
    </table>
</div>
